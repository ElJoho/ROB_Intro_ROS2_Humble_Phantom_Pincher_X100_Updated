arm:
  # You can keep the IKFast or other options commented out if you like
  # kinematics_solver: phantomx_pincher_arm/IKFastKinematicsPlugin
  # kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.001  # era 0.005 → búsqueda más fina
  kinematics_solver_timeout: 0.5              # era 0.05 s → más tiempo para solución de calidad
  position_only_ik: true
  kinematics_solver_attempts: 10             # era 5 → más intentos para mejor solución
